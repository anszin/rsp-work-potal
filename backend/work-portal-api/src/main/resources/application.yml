spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/work_portal}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  jackson:
    time-zone: Asia/Seoul
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:work-portal-jwt-secret-key-must-be-at-least-32-characters-long}
  expiration: 86400000

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  upload:
    path: ${UPLOAD_PATH:/opt/rsp-work-portal/uploads}
  site-url: ${SITE_URL:https://rsp-work-potal.vercel.app}

redmine:
  base-url: ${REDMINE_URL:https://54.180.246.95}
  api-key: ${REDMINE_API_KEY:73a41e7b34c67d93acce697355f7332283ef9916}
  trackers:
    - id: 1
      name: 버그
      statuses:
        - { id: 1, name: 신규 }
        - { id: 2, name: 진행중 }
        - { id: 3, name: 해결됨 }
        - { id: 5, name: 완료 }
    - id: 2
      name: 기능
      statuses:
        - { id: 1, name: 신규 }
        - { id: 2, name: 진행중 }
        - { id: 5, name: 완료 }
    - id: 3
      name: 지원
      statuses:
        - { id: 1, name: 신규 }
        - { id: 2, name: 진행중 }
        - { id: 5, name: 완료 }

webex:
  bot-token: ${WEBEX_BOT_TOKEN:}
  room-id: ${WEBEX_ROOM_ID:}

logging:
  level:
    com.platform.portal: INFO
